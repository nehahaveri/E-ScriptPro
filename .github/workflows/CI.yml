name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      authservice: ${{ steps.filter.outputs.authservice }}
      doctor: ${{ steps.filter.outputs.doctor }}
      patient: ${{ steps.filter.outputs.patient }}
      medicine: ${{ steps.filter.outputs.medicine }}
      pdf: ${{ steps.filter.outputs.pdf }}
      prescription: ${{ steps.filter.outputs.prescription }}
      receptionist: ${{ steps.filter.outputs.receptionist }}
      gateway: ${{ steps.filter.outputs.gateway }}
      frontend: ${{ steps.filter.outputs.frontend }}

    steps:
      - uses: actions/checkout@v3

      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            authservice:
              - 'authservice/**'
            doctor:
              - 'doctor-service/**'
            patient:
              - 'patient-service/**'
            medicine:
              - 'medicine-service/**'
            pdf:
              - 'pdf-service/**'
            prescription:
              - 'prescription-service/**'
            receptionist:
              - 'receptionist-service/**'
            gateway:
              - 'api-gateway/**'
            frontend:
              - 'escriptpro-frontend/**'

  build-and-deploy:
    needs: detect-changes
    runs-on: ubuntu-latest
    env:
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}

    steps:
      - uses: actions/checkout@v3

      # Install kubectl
      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/v1.29.0/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      # Docker login
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Setup kubeconfig
      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

      # ---------- AUTH ----------
      - name: Build & Deploy Auth
        if: needs.detect-changes.outputs.authservice == 'true'
        run: |
          docker build -t amoghlokhande/authservice:${{ github.sha }} ./authservice
          docker push amoghlokhande/authservice:${{ github.sha }}
          kubectl set image deployment/authservice authservice=amoghlokhande/authservice:${{ github.sha }} -n escriptpro
          kubectl rollout status deployment/authservice -n escriptpro

      # ---------- DOCTOR ----------
      - name: Build & Deploy Doctor
        if: needs.detect-changes.outputs.doctor == 'true'
        run: |
          docker build -t amoghlokhande/doctor-service:${{ github.sha }} ./doctor-service
          docker push amoghlokhande/doctor-service:${{ github.sha }}
          kubectl set image deployment/doctor-service doctor-service=amoghlokhande/doctor-service:${{ github.sha }} -n escriptpro
          kubectl rollout status deployment/doctor-service -n escriptpro

      # ---------- PATIENT ----------
      - name: Build & Deploy Patient
        if: needs.detect-changes.outputs.patient == 'true'
        run: |
          docker build -t amoghlokhande/patient-service:${{ github.sha }} ./patient-service
          docker push amoghlokhande/patient-service:${{ github.sha }}
          kubectl set image deployment/patient-service patient-service=amoghlokhande/patient-service:${{ github.sha }} -n escriptpro
          kubectl rollout status deployment/patient-service -n escriptpro

      # ---------- MEDICINE ----------
      - name: Build & Deploy Medicine
        if: needs.detect-changes.outputs.medicine == 'true'
        run: |
          docker build -t amoghlokhande/medicine-service:${{ github.sha }} ./medicine-service
          docker push amoghlokhande/medicine-service:${{ github.sha }}
          kubectl set image deployment/medicine-service medicine-service=amoghlokhande/medicine-service:${{ github.sha }} -n escriptpro
          kubectl rollout status deployment/medicine-service -n escriptpro

      # ---------- PDF ----------
      - name: Build & Deploy PDF
        if: needs.detect-changes.outputs.pdf == 'true'
        run: |
          docker build -t amoghlokhande/pdf-service:${{ github.sha }} ./pdf-service
          docker push amoghlokhande/pdf-service:${{ github.sha }}
          kubectl set image deployment/pdf-service pdf-service=amoghlokhande/pdf-service:${{ github.sha }} -n escriptpro
          kubectl rollout status deployment/pdf-service -n escriptpro

      # ---------- PRESCRIPTION ----------
      - name: Build & Deploy Prescription
        if: needs.detect-changes.outputs.prescription == 'true'
        run: |
          docker build -t amoghlokhande/prescription-service:${{ github.sha }} ./prescription-service
          docker push amoghlokhande/prescription-service:${{ github.sha }}
          kubectl set image deployment/prescription-service prescription-service=amoghlokhande/prescription-service:${{ github.sha }} -n escriptpro
          kubectl rollout status deployment/prescription-service -n escriptpro

      # ---------- RECEPTIONIST ----------
      - name: Build & Deploy Receptionist
        if: needs.detect-changes.outputs.receptionist == 'true'
        run: |
          docker build -t amoghlokhande/receptionist-service:${{ github.sha }} ./receptionist-service
          docker push amoghlokhande/receptionist-service:${{ github.sha }}
          kubectl set image deployment/receptionist-service receptionist-service=amoghlokhande/receptionist-service:${{ github.sha }} -n escriptpro
          kubectl rollout status deployment/receptionist-service -n escriptpro

      # ---------- API GATEWAY ----------
      - name: Build & Deploy Gateway
        if: needs.detect-changes.outputs.gateway == 'true'
        run: |
          docker build -t amoghlokhande/api-gateway:${{ github.sha }} ./api-gateway
          docker push amoghlokhande/api-gateway:${{ github.sha }}
          kubectl set image deployment/api-gateway api-gateway=amoghlokhande/api-gateway:${{ github.sha }} -n escriptpro
          kubectl rollout status deployment/api-gateway -n escriptpro

      # ---------- FRONTEND ----------
      - name: Build & Deploy Frontend
        if: needs.detect-changes.outputs.frontend == 'true'
        run: |
          docker build \
            --build-arg VITE_API_BASE_URL=https://escriptpro.nehahaveri.in/api \
            -t amoghlokhande/escriptpro-frontend:${{ github.sha }} ./escriptpro-frontend
          docker push amoghlokhande/escriptpro-frontend:${{ github.sha }}
          kubectl set image deployment/frontend frontend=amoghlokhande/escriptpro-frontend:${{ github.sha }} -n escriptpro
          kubectl rollout status deployment/frontend -n escriptpro --timeout=120s