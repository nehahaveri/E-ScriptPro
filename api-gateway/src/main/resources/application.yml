server:
  port: 8081

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - "http://localhost:*"
              - "http://127.0.0.1:*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
      server:
        webflux:
          routes:
            - id: auth-service
              uri: http://localhost:8080
              predicates:
                - Path=/api/auth/**
              filters:
                - StripPrefix=1
            - id: doctor-service
              uri: http://localhost:8086
              predicates:
                - Path=/api/doctors/**
              filters:
                - StripPrefix=1
            - id: patient-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/patients/**
              filters:
                - StripPrefix=1
            - id: prescription-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/prescriptions/**
              filters:
                - StripPrefix=1
            - id: medicine-service
              uri: http://localhost:8084
              predicates:
                - Path=/api/medicines/**
              filters:
                - StripPrefix=1
            - id: pdf-service
              uri: http://localhost:8085
              predicates:
                - Path=/api/pdf/**
              filters:
                - StripPrefix=1
