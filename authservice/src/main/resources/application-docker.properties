# Spring Boot Docker-specific application properties

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://postgres:5432/authservice_db
spring.datasource.username=escriptpro
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.initializationFailTimeout=60000
spring.datasource.hikari.connectionTimeout=30000
spring.datasource.hikari.maximumPoolSize=5

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Redis Configuration
spring.redis.host=redis
spring.redis.port=6379

# Kafka Configuration
spring.kafka.bootstrap-servers=kafka:9092

# Google OAuth Configuration
google.client.id=${GOOGLE_CLIENT_ID}
google.client.secret=${GOOGLE_CLIENT_SECRET}

# Service URLs (Docker)
services.doctor-service.url=http://doctor-service:8086
services.receptionist-service.url=http://receptionist-service:8087

