spring.application.name=authservice
server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/auth_db
spring.datasource.username=postgres
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

jwt.secret=escriptpro-authservice-jwt-secret-key-for-development-only-2026-escriptpro-secure

google.client.id=${GOOGLE_CLIENT_ID}
google.client.secret=${GOOGLE_CLIENT_SECRET}

security.password.bcrypt-strength=10
security.mfa.enabled=false
security.mfa.provider=noop
security.mfa.default-region=IN

spring.datasource.hikari.initializationFailTimeout=60000
spring.datasource.hikari.connectionTimeout=30000
spring.datasource.hikari.maximumPoolSize=5

# Service URLs
services.doctor-service.url=http://localhost:8086
services.receptionist-service.url=http://localhost:8087

