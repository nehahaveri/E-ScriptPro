# PostgreSQL
spring.datasource.url=jdbc:postgresql://postgres:5432/patient_service_db
spring.datasource.username=escriptpro
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Redis
spring.redis.host=redis
spring.redis.port=6379

# Kafka
spring.kafka.bootstrap-servers=kafka:9092

# Service URLs
services.doctor-service.url=http://doctor-service:8086
services.prescription-service.url=http://prescription-service:8083