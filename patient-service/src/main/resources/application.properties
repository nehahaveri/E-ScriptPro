spring.application.name=patient-service
# Server Port (VERY IMPORTANT)
server.port=8082

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/patient_db
spring.datasource.username=postgres
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.kafka.bootstrap-servers=localhost:9092

# Google Calendar OAuth
google.calendar.client-id=
google.calendar.client-secret=
google.calendar.redirect-uri=http://localhost:8082/calendar/google/callback
google.calendar.default-post-connect-redirect=http://localhost:5173/dashboard?service=patients

# Service URLs
services.doctor-service.url=http://localhost:8086
services.prescription-service.url=http://localhost:8083

spring.datasource.hikari.initializationFailTimeout=60000
spring.datasource.hikari.connectionTimeout=30000
spring.datasource.hikari.maximumPoolSize=5