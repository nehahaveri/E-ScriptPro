spring.application.name=pdf-service
server.port=8085
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=pdf-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

spring.datasource.hikari.initializationFailTimeout=60000
spring.datasource.hikari.connectionTimeout=30000
spring.datasource.hikari.maximumPoolSize=5

# Backblaze B2 S3 Configuration
app.s3.endpoint=${S3_ENDPOINT:https://s3.ca-east-006.backblazeb2.com}
app.s3.bucket-name=${S3_BUCKET_NAME:8d47dcfb84c6a6969fd20310}
app.s3.access-key-id=${S3_ACCESS_KEY_ID}
app.s3.secret-access-key=${S3_SECRET_ACCESS_KEY}
app.s3.region=${S3_REGION:ca-east-006}

# Service URLs
services.prescription-service.url=http://localhost:8084
