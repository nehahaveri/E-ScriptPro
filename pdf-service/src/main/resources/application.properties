spring.application.name=pdf-service
server.port=8085
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=pdf-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# H2 in-memory DB for local dev (PostgreSQL used in Docker via application-docker.properties)
spring.datasource.url=jdbc:h2:file:./data/pdf_service_db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.datasource.hikari.initializationFailTimeout=60000
spring.datasource.hikari.connectionTimeout=30000
spring.datasource.hikari.maximumPoolSize=5
