spring.application.name=prescription-service
server.port=8083

spring.datasource.url=jdbc:postgresql://localhost:5432/prescription_db
spring.datasource.username=postgres
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.kafka.bootstrap-servers=localhost:9092

# Service URLs
services.pdf-service.url=http://localhost:8085
services.medicine-service.url=http://localhost:8084
services.doctor-service.url=http://localhost:8086
services.patient-service.url=http://localhost:8082

spring.datasource.hikari.initializationFailTimeout=60000
spring.datasource.hikari.connectionTimeout=30000
spring.datasource.hikari.maximumPoolSize=5

# Backblaze B2 S3 Configuration
app.s3.endpoint=${S3_ENDPOINT:https://s3.ca-east-006.backblazeb2.com}
app.s3.bucket-name=${S3_BUCKET_NAME:8d47dcfb84c6a6969fd20310}
app.s3.access-key-id=${S3_ACCESS_KEY_ID}
app.s3.secret-access-key=${S3_SECRET_ACCESS_KEY}
app.s3.region=${S3_REGION:ca-east-006}
