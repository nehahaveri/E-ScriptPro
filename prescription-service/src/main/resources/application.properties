spring.application.name=prescription-service
server.port=8083

spring.datasource.url=jdbc:postgresql://localhost:5432/prescription_db
spring.datasource.username=postgres
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.kafka.bootstrap-servers=localhost:9092

# Service URLs
services.pdf-service.url=http://localhost:8085
services.medicine-service.url=http://localhost:8084
services.doctor-service.url=http://localhost:8086
services.patient-service.url=http://localhost:8082

spring.datasource.hikari.initializationFailTimeout=60000
spring.datasource.hikari.connectionTimeout=30000
spring.datasource.hikari.maximumPoolSize=5
